{% extends 'store/base.html' %} {% block title %} Login - MyStore {% endblock %}
{% block content %}

<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8f9ff, #eef1ff);
    padding: 40px 20px;
  }

  .login-card {
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
  }

  .login-title {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 5px;
  }

  .login-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 20px;
  }

  .login-tabs {
    display: flex;
    background: #f2f2f2;
    border-radius: 14px;
    padding: 6px;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .tab-btn.active {
    background: #111;
    color: #fff;
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    height: 50px;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 15px;
    background: #fafafa;
  }

  .form-input:focus {
    outline: none;
    border-color: #111;
    background: #fff;
  }

  .login-btn {
    width: 100%;
    height: 50px;
    border: none;
    background: #111;
    color: #fff;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .otp-btn {
    width: 100%;
    height: 50px;
    border: none;
    background: #f1f1f1;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .otp-btn:hover {
    background: #111;
    color: #fff;
  }

  .google-btn {
    width: 100%;
    height: 52px;
    border: 1px solid #ddd;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    color: #000;
    font-weight: 600;
    margin-top: 20px;
  }

  input::placeholder {
    color: #999;
    opacity: 1;
  }
</style>

<div class="login-page">
  <div class="login-card">
    <h2 class="login-title">Welcome Back</h2>
    <p class="login-subtitle">Login to continue</p>

    {% if messages %} {% for message in messages %}
    <div
      style="
        padding: 10px;
        background: #f5f5f5;
        margin-bottom: 10px;
        border-radius: 10px;
      "
    >
      {{ message }}
    </div>
    {% endfor %} {% endif %}

    <!-- TABS -->
    <div class="login-tabs">
      <button class="tab-btn active" onclick="openTab('loginTab', this)">
        Username
      </button>

      <button class="tab-btn" onclick="openTab('otpTab', this)">
        Email OTP
      </button>
    </div>

    <!-- USERNAME LOGIN -->
    <div id="loginTab" class="tab-content active">
      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">Username</label>
          <input
            type="text"
            name="username"
            class="form-input"
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-input"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="login-btn">Login Now</button>
      </form>
    </div>

    <!-- OTP LOGIN -->
    <div id="otpTab" class="tab-content">
      <form method="post" action="{% url 'send_otp' %}">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            type="email"
            name="email"
            class="form-input"
            placeholder="Enter your email address"
            required
          />
        </div>

        <button type="submit" class="otp-btn">Send OTP</button>
      </form>
    </div>

    <!-- GOOGLE LOGIN (UPDATED - HERE ONLY) -->
    <a href="/accounts/google/login/" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path
          fill="#FFC107"
          d="M43.611 20.083H42V20H24v8h11.303C33.659 32.657 29.207 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
        />
        <path
          fill="#FF3D00"
          d="M6.306 14.691l6.571 4.819C14.655 16.108 19.003 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
        />
        <path
          fill="#4CAF50"
          d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.176 0-9.615-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
        />
        <path
          fill="#1976D2"
          d="M43.611 20.083H42V20H24v8h11.303c-1.058 3.104-3.223 5.563-6.084 7.083l.003-.002 6.19 5.238C33.971 41.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
        />
      </svg>
      Continue with Google
    </a>
  </div>
</div>

<script>
  function openTab(tabId, btn) {
    document
      .querySelectorAll(".tab-content")
      .forEach((t) => t.classList.remove("active"));
    document
      .querySelectorAll(".tab-btn")
      .forEach((b) => b.classList.remove("active"));

    document.getElementById(tabId).classList.add("active");
    btn.classList.add("active");
  }
</script>

{% endblock %}
