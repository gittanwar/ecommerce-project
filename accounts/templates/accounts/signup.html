{% extends 'store/base.html' %} {% block title %}Sign Up - MyStore{% endblock %}
{% block content %}

<style>
  .signup-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8f9ff, #eef1ff);
    padding: 40px 20px;
  }

  .signup-card {
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
  }

  .signup-title {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 5px;
  }

  .signup-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 25px;
  }
  /* FORM */

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    height: 50px;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 15px;
    background: #fafafa;
  }

  .form-input:focus {
    outline: none;
    border-color: #111;
    background: #fff;
  }
  /* BUTTON */

  .signup-btn {
    width: 100%;
    height: 50px;
    border: none;
    background: #111;
    color: #fff;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  .signup-btn:hover {
    background: #000;
  }
  /* LINK */

  .bottom-text {
    text-align: center;
    margin-top: 15px;
    color: #666;
  }

  .bottom-text a {
    color: #111;
    font-weight: 600;
    text-decoration: none;
  }
  /* ALERT */

  .alert {
    padding: 10px;
    background: #f5f5f5;
    border-radius: 10px;
    margin-bottom: 15px;
  }
</style>

<div class="signup-page">
  <div class="signup-card">
    <h2 class="signup-title">Create Account</h2>
    <p class="signup-subtitle">Join MyStore to start shopping</p>

    {% if messages %} {% for message in messages %}
    <div class="alert">{{ message }}</div>
    {% endfor %} {% endif %}

    <form method="post">
      {% csrf_token %}

      <!-- Username -->
      <div class="form-group">
        <label class="form-label">Username</label>
        <input
          type="text"
          name="username"
          class="form-input"
          placeholder="Enter your username"
          required
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          name="email"
          class="form-input"
          placeholder="Enter your email address"
          required
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password1"
          class="form-input"
          placeholder="Create password"
          required
        />
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input
          type="password"
          name="password2"
          class="form-input"
          placeholder="Re-enter password"
          required
        />
      </div>

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <div class="bottom-text">
      Already have an account?
      <a href="{% url 'login' %}">Login</a>
    </div>
  </div>
</div>

{% endblock %}
