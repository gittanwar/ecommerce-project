{% extends 'store/base.html' %} {% block content %}

<style>
    .otp-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f7fb;
        padding: 20px;
    }
    
    .otp-card {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: 30px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
    }
    
    .otp-icon {
        width: 90px;
        height: 90px;
        background: #111;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
        font-size: 40px;
    }
    
    .otp-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 10px;
    }
    
    .otp-subtitle {
        color: #777;
        line-height: 1.7;
        margin-bottom: 35px;
    }
    
    .otp-inputs {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 30px;
    }
    
    .otp-input {
        width: 60px;
        height: 65px;
        border: 2px solid #ddd;
        border-radius: 16px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        transition: 0.3s ease;
    }
    
    .otp-input:focus {
        border-color: #111;
        outline: none;
        box-shadow: 0 0 0 5px rgba(0, 0, 0, 0.06);
    }
    
    .verify-btn {
        width: 100%;
        height: 58px;
        border: none;
        border-radius: 16px;
        background: #111;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
    }
    
    .verify-btn:hover {
        transform: translateY(-2px);
    }
    
    .resend {
        margin-top: 20px;
        color: #777;
    }
    
    .resend a {
        color: #111;
        text-decoration: none;
        font-weight: 600;
    }
    
    @media (max-width: 600px) {
        .otp-card {
            padding: 35px 20px;
        }
        .otp-input {
            width: 45px;
            height: 55px;
            font-size: 20px;
        }
    }
</style>

<div class="otp-page">
    <div class="otp-card">
        <div class="otp-icon">🔐</div>

        <h1 class="otp-title">OTP Verification</h1>

        <p class="otp-subtitle">Enter the 6 digit code sent to your email</p>

        {% if messages %} {% for message in messages %}

        <p style="color: red; margin-bottom: 20px">{{ message }}</p>

        {% endfor %} {% endif %}

        <form method="post" id="otpForm">
            {% csrf_token %}

            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
                <input type="text" maxlength="1" class="otp-input" />
            </div>

            <!-- HIDDEN FINAL OTP -->

            <input type="hidden" name="otp" id="finalOtp" />

            <button type="submit" class="verify-btn">Verify OTP</button>
        </form>

        <div class="resend">
            Didn't receive code?

            <a href="{% url 'resend_otp' %}">
    Resend OTP
</a>
        </div>
    </div>
</div>

<script>
    const otpInputs = document.querySelectorAll(".otp-input");

    const finalOtp = document.getElementById("finalOtp");

    otpInputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
            if (e.target.value.length === 1) {
                if (index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            }

            updateOtp();
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && index > 0) {
                otpInputs[index - 1].focus();
            }
        });
    });

    function updateOtp() {
        let otp = "";

        otpInputs.forEach((input) => {
            otp += input.value;
        });

        finalOtp.value = otp;
    }
</script>

{% endblock %}
